<c-vars side="right"></c-vars>

<template x-teleport="body">
  <!-- Backdrop -->
  <div
    x-show="open"
    x-transition:enter="ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-[9990] bg-background/80 backdrop-blur-sm"
    aria-hidden="true"
    x-cloak
    @click="hideSheet()"
  ></div>

  <!-- Panel -->
  <div
    x-show="open"
    class="fixed z-[9991] flex flex-col bg-background shadow-xl border-border
      {% if side == 'right' %}inset-y-0 right-0 h-full border-l {% if not class or 'w-' not in class %}w-[min(100vw-2rem,20rem)]{% endif %}
      {% elif side == 'left' %}inset-y-0 left-0 h-full border-r {% if not class or 'w-' not in class %}w-[min(100vw-2rem,20rem)]{% endif %}
      {% elif side == 'top' %}inset-x-0 top-0 w-full border-b {% if not class or 'h-' not in class %}h-auto max-h-[85vh]{% endif %}
      {% elif side == 'bottom' %}inset-x-0 bottom-0 w-full border-t {% if not class or 'h-' not in class %}h-auto max-h-[85vh]{% endif %}
      {% endif %}
      {% if class %}{{ class }}{% endif %}"
    x-transition:enter="transform transition ease-out duration-300"
    x-transition:enter-start="{% if side == 'right' %}translate-x-full{% elif side == 'left' %}-translate-x-full{% elif side == 'top' %}-translate-y-full{% elif side == 'bottom' %}translate-y-full{% endif %}"
    x-transition:enter-end="translate-x-0 translate-y-0"
    x-transition:leave="transform transition ease-in duration-200"
    x-transition:leave-start="translate-x-0 translate-y-0"
    x-transition:leave-end="{% if side == 'right' %}translate-x-full{% elif side == 'left' %}-translate-x-full{% elif side == 'top' %}-translate-y-full{% elif side == 'bottom' %}translate-y-full{% endif %}"
    role="dialog"
    aria-modal="true"
    aria-label="Navigation menu"
    data-mobile-sheet-panel
    x-cloak
    {{ attrs }}
  >
    <c-button
      type="button"
      variant="ghost"
      size="icon"
      class="absolute right-3 top-3 rounded-md opacity-70 hover:opacity-100"
      @click="hideSheet()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
        <path d="M18 6 6 18"></path>
        <path d="m6 6 12 12"></path>
      </svg>
      <span class="sr-only">Close</span>
    </c-button>

    <div class="flex-1 overflow-y-auto overscroll-contain mobile-sheet-body p-5 pt-12">
      {{ slot }}
    </div>
  </div>
</template>
