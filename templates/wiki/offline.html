{% extends "base.html" %}

{% block title %}Offline — {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-16 text-center">
  <c-card class="max-w-md w-full">
    <c-card.header class="text-center">
      <div class="text-5xl mb-2">📡</div>
      <c-card.title>You're offline</c-card.title>
      <c-card.description>
        Cached pages may still be available. Check your bookmarks or try again when connected.
      </c-card.description>
    </c-card.header>
    <c-card.footer class="flex justify-center pb-6">
      <a href="{% url 'wiki:home' %}">
        <c-button>Go to Home</c-button>
      </a>
    </c-card.footer>
  </c-card>
</div>
{% endblock %}
