<c-card class="border-0 shadow-none">
  <c-card.header class="p-4 pb-2">
    <c-card.title class="text-base">{{ page.title }}</c-card.title>
  </c-card.header>
  <c-card.content class="p-4 pt-0">
    <p class="text-sm text-muted-foreground">{{ page.summary|default:"No summary available." }}</p>
    <a href="{{ page.get_absolute_url }}" class="text-sm text-primary hover:underline underline-offset-4 mt-2 inline-block">
      Read full article →
    </a>
  </c-card.content>
</c-card>
