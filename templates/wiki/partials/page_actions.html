{% load wiki_tags %}
<div class="flex flex-wrap items-center gap-2" data-page-actions data-share-url="{{ share_api_url|default:'' }}">
  {% include "wiki/partials/page_ai_panel.html" %}
  <c-button type="button" variant="outline" size="sm" data-share-open title="Share this page">
    {% lucide "share-2" size=14 %} Share
  </c-button>
  <c-button type="button" variant="outline" size="sm" data-reading-toggle title="Reading view">
    <span data-reading-label>Reading view</span>
  </c-button>
</div>

<dialog id="wiki-share-modal" class="wiki-share-modal rounded-xl border border-border bg-background p-0 shadow-xl backdrop:bg-black/50 max-w-md w-[calc(100%-2rem)]">
  <div class="p-6">
    <div class="flex items-start justify-between gap-4 mb-4">
      <div>
        <h2 class="text-lg font-semibold">Share wiki page</h2>
        <p class="text-sm text-muted-foreground mt-1" data-share-title>{{ page.title|default:"Wiki page" }}</p>
      </div>
      <button type="button" data-share-close class="text-muted-foreground hover:text-foreground" aria-label="Close">&times;</button>
    </div>
    <div class="space-y-3">
      <button type="button" data-share-native
        class="w-full inline-flex items-center justify-center gap-2 h-10 rounded-md bg-primary text-primary-foreground text-sm font-medium hover:bg-primary/90">
        {% lucide "share-2" size=16 %} Share via device
      </button>
      <button type="button" data-copy-link
        class="w-full inline-flex items-center justify-center gap-2 h-10 rounded-md border border-input bg-background text-sm font-medium hover:bg-accent">
        Copy link
      </button>
      <div class="flex items-center gap-2">
        <input type="text" readonly data-share-url-input
          class="flex-1 h-9 rounded-md border border-input bg-muted px-3 text-xs truncate"
          value="">
        <button type="button" data-copy-url-input class="shrink-0 h-9 px-3 rounded-md border border-input text-xs hover:bg-accent">
          Copy
        </button>
      </div>
    </div>
  </div>
</dialog>
