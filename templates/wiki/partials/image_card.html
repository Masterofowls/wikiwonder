{% load humanize wiki_tags %}
<c-card class="group image-card snap-start shrink-0 w-72 sm:w-80 overflow-hidden transition-all duration-300 hover:-translate-y-1 hover:shadow-lg"
  data-preview-url="{% url 'wiki:page_preview' page.slug %}">
  <a href="{{ page.get_absolute_url }}" class="block">
    <div class="relative aspect-video overflow-hidden bg-muted">
      <img src="{{ page.cover_url }}" alt="{{ page.title }}"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
        loading="lazy">
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-80"></div>
      {% if page.is_featured %}
      <c-badge class="absolute top-3 left-3" variant="default">Featured</c-badge>
      {% endif %}
      <div class="absolute bottom-3 left-3 right-3">
        <h3 class="font-display font-semibold text-white line-clamp-2 drop-shadow-sm">{{ page.title }}</h3>
      </div>
    </div>
    <c-card.content class="pt-4">
      {% if page.summary %}
      <p class="text-sm text-muted-foreground line-clamp-2 mb-3">{{ page.summary }}</p>
      {% endif %}
      <div class="flex items-center gap-2 text-xs text-muted-foreground">
        {% lucide "eye" size=14 css_class="icon-pulse" %}
        <span>{{ page.view_count }}</span>
        <span>·</span>
        <span>{{ page.updated_at|naturaltime }}</span>
      </div>
    </c-card.content>
  </a>
</c-card>
