{% load humanize %}
<c-card class="group hover:shadow-md transition-shadow cursor-pointer h-full"
  data-preview-url="{% url 'wiki:page_preview' page.slug %}">
  <a href="{{ page.get_absolute_url }}" class="block h-full">
    <c-card.header class="pb-3">
      <div class="flex items-start justify-between gap-2">
        <c-card.title class="group-hover:text-primary transition-colors line-clamp-2">{{ page.title }}</c-card.title>
        {% if page.is_featured %}
        <c-badge variant="default" class="shrink-0">Featured</c-badge>
        {% endif %}
      </div>
      {% if page.summary %}
      <c-card.description class="line-clamp-3">{{ page.summary }}</c-card.description>
      {% endif %}
    </c-card.header>
    <c-card.content>
      <div class="flex flex-wrap items-center gap-2 text-xs text-muted-foreground">
        {% if page.category %}
        <c-badge variant="outline">{{ page.category.name }}</c-badge>
        {% endif %}
        <span>{{ page.updated_at|naturaltime }}</span>
        <span>·</span>
        <span>{{ page.view_count }} views</span>
      </div>
    </c-card.content>
  </a>
</c-card>
