name: WikiWonder CI (Next.js)

on:
  push:
    branches: [main, cursor/**]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder"

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder"

      - name: Build Next.js app (Turbopack)
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder"
          NEXT_PUBLIC_SITE_URL: "https://wikiwonder.fly.dev"
          NEXT_PUBLIC_SITE_NAME: "WikiWonder"
          SKIP_ENV_VALIDATION: "1"

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wikiwonder_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder_test"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder_test"

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder_test"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/wikiwonder_test"
          NEXT_PUBLIC_SITE_URL: "http://localhost:9000"
