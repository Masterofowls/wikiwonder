services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wikiwonder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wikiwonder
      DIRECT_URL: postgresql://postgres:postgres@db:5432/wikiwonder
      NEXT_PUBLIC_SITE_URL: http://localhost:9000
      NEXT_PUBLIC_SITE_NAME: WikiWonder
      NODE_ENV: production
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      CEREBRAS_MODEL: ${CEREBRAS_MODEL:-gpt-oss-120b}
      LARA_ACCESS_KEY_ID: ${LARA_ACCESS_KEY_ID:-}
      LARA_ACCESS_KEY_SECRET: ${LARA_ACCESS_KEY_SECRET:-}
      LARA_AUTO_TRANSLATE: ${LARA_AUTO_TRANSLATE:-false}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
